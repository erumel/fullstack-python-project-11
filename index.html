<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RSS агрегатор</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Crect x='1' y='1' width='14' height='14' rx='2' fill='%23FA9B39'/%3E%3Cpath d='M4 12a1.5 1.5 0 100-3 1.5 1.5 0 000 3zm0-5a5 5 0 015 5 1.5 1.5 0 11-3 0 2 2 0 00-2-2 1.5 1.5 0 110-3zm0-4a9 9 0 019 9 1.5 1.5 0 11-3 0 6 6 0 00-6-6 1.5 1.5 0 110-3z' fill='white'/%3E%3C/svg%3E">
</head>
<body>
  <header class="container-fluid bg-dark text-light">
    <div class="row">
      <div class="col-8 mx-auto">
        <h1 id="title" class="mt-3">RSS агрегатор</h1>
        <p id="tagline" class="p-0">Начните читать RSS сегодня! Это легко, это красиво.</p>
        <form id="rss-form" class="row" novalidate>
          <div class="col-9">
            <label id="rss-lable" for="rss-input" class="visually-hidden">Ссылка RSS</label>
            <input id="rss-input" name="rss-input" type="url" class="form-control w-100" placeholder="Ссылка RSS">
          </div>
          <div class="col-3 m-0">
            <button id="add-rss" class="btn btn-primary w-100 text-truncate">Добавить</button>
          </div>
        </form>
        <p id="example" class="mt-1 mb-0 text-secondary">Пример: https://lorem-rss.hexlet.app/feed</p>
        <p id="status" class="mb-2" style="min-height: 1.5em; line-height: 1.5em"></p>
      </div>
    </div>
  </header>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
