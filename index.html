<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RSS Reader</title>
  <link rel="stylesheet" href="/src/style.css">
</head>
<body>
  <div class="container mt-5">
    <h1 class="mb-4">RSS Reader</h1>
    <form id="rss-form" class="row g-3">
      <div class="col-auto">
        <label for="rss-input" class="visually-hidden">RSS ссылка</label>
        <input 
          type="text" 
          class="form-control" 
          id="rss-input" 
          placeholder="Введите RSS-ссылку"
          required
        >
      </div>
      <div class="col-auto">
        <button type="submit" class="btn btn-primary">Добавить</button>
      </div>
    </form>
  </div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
