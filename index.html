<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RSS агрегатор</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Crect x='1' y='1' width='14' height='14' rx='2' fill='%23FA9B39'/%3E%3Cpath d='M4 12a1.5 1.5 0 100-3 1.5 1.5 0 000 3zm0-5a5 5 0 015 5 1.5 1.5 0 11-3 0 2 2 0 00-2-2 1.5 1.5 0 110-3zm0-4a9 9 0 019 9 1.5 1.5 0 11-3 0 6 6 0 00-6-6 1.5 1.5 0 110-3z' fill='white'/%3E%3C/svg%3E">
</head>
<body>
  <header class="container-fluid bg-dark text-light px-1">
    <div class="row">
      <div class="col-12 col-md-8 mx-auto px-2 px-md-3">
        <h1 data-i18n="header.title" class="mt-3">RSS агрегатор</h1>
        <p data-i18n="header.tagline" class="p-0">Начните читать RSS сегодня! Это легко, это красиво.</p>
        <form id="rss-form" class="row mb-1" novalidate>
          <div class="col-9">
            <label for="rss-input" data-i18n="form.label" class="visually-hidden">Ссылка RSS</label>
            <input id="rss-input" data-i18n-placeholder="form.placeholder" name="rss-input" type="url" class="form-control w-100" placeholder="Ссылка RSS">
          </div>
          <div class="col-3 m-0">
            <button id="rss-submit-btn" data-i18n="form.button" type="submit" class="btn btn-primary w-100 text-truncate small-md">Добавить</button>
          </div>
        </form>
        <small data-i18n="form.example" class="my-0 text-secondary">Пример: https://lorem-rss.hexlet.app/feed</small>
        <output id="status" class="mb-1 d-block" style="min-height: 1.5em; line-height: 1.5em"></output>
      </div>
    </div>
  </header>
  <main class="container pt-3 px-1">
    <div class="row g-4">
      <section class="col-12 col-md-8">
        <h4 data-i18n="sections.posts">Посты</h4>
        <div id="posts-container"></div>
      </section>
      <section class="col-12 col-md-4">
        <h4 data-i18n="sections.feeds">Фиды</h4>
        <div id="feeds-container"></div>
      </section>
    </div>
  </main>
  <div class="modal fade" id="post-modal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="modal-title">Загрузка...</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <p id="modal-description"></p>
        </div>
        <div class="modal-footer">
          <a id="modal-link" href="#" target="_blank" rel="noopener noreferrer" class="btn btn-primary" data-i18n="actions.readFull">Читать полностью</a>
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal" data-i18n="actions.close">Закрыть</button>
        </div>
      </div>
    </div>
  </div> 
  <script type="module" src="/src/main.js"></script>
</body>
</html>
