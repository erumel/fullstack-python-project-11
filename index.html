<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RSS Reader</title>
</head>
<body>
  <header class="bg-dark text-light pt-4">
    <div class="container w-50">
      <h1 class="mb-1">RSS агрегатор</h1>
      <p class="my-1">Начните читать RSS сегодня! Это легко, это красиво.</p>
      <form class="d-flex align-items-stretch gap-2" novalidate>
        <label for="url-input" class="visually-hidden">Ссылка RSS</label>
        <input 
          class="w-75"
          type="url"
          id="url-input" 
          placeholder="Ссылка RSS" 
          required
        >
        <button type="submit" class="btn btn-primary w-25 bg-light text-dark border-0 ms-auto" >Добавить</button>
      </form>
      <p  class="text-secondary mb-0 mt-1">Пример: https://lorem-rss.hexlet.app/feed</p>
      <p  class="status-info pb-1 text-danger" style="min-height: 2rem;"></p>
    </div>
  </header>
   <script type="module" src="/src/main.js"></script>
</body>
</html>
